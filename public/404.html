<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Proxomind Labs</title>
  </head>
  <body>
    <script>
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem('proxomind-redirect', path);
        window.location.replace('/');
      })();
    </script>
  </body>
</html>
